name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  testsuite:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.4']
        prefer-lowest: ['']
        include:
          - php-version: '8.2'
            prefer-lowest: 'prefer-lowest'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, intl
          coverage: pcov

      - name: Composer install
        run: |
          if [[ ${{ matrix.prefer-lowest }} == 'prefer-lowest' ]]; then
            composer update --prefer-lowest --prefer-stable --prefer-dist --no-interaction
          else
            composer install --prefer-dist --no-interaction
          fi

      - name: Run PHPUnit
        run: |
          if [[ ${{ matrix.php-version }} == '8.4' && ${{ matrix.prefer-lowest }} != 'prefer-lowest' ]]; then
            vendor/bin/phpunit --coverage-clover=coverage.xml
          else
            vendor/bin/phpunit
          fi

      - name: Upload coverage
        if: matrix.php-version == '8.4' && matrix.prefer-lowest != 'prefer-lowest'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  validation:
    name: Coding Standards & Static Analysis
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl
          coverage: none

      - name: Composer install
        run: composer install --prefer-dist --no-interaction

      - name: Run phpstan
        run: composer stan-setup && composer stan

      - name: Run phpcs
        run: composer cs-check
